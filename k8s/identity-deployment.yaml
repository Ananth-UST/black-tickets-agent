apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: ticketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
      - name: identity-service
        image: ananthakkumar/new_ticket-identity-service:v2
        ports:
        - containerPort: 4001
        envFrom:
        - configMapRef:
            name: ticketing-config
        - secretRef:
            name: ticketing-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 4001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4001
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: ticketing
spec:
  selector:
    app: identity-service
  ports:
  - port: 4001
    targetPort: 4001
  type: ClusterIP
