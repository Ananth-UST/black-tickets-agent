version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ticketing_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ticketing_prod}
    # No port binding - internal only for production
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ticketing_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketing_user}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  identity-service:
    build: ./identity-service
    container_name: identity-service
    restart: unless-stopped
    env_file:
      - ./identity-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ticketing_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  event-service:
    build: ./event-service
    container_name: event-service
    restart: unless-stopped
    networks:
      - ticketing_network
    env_file:
      - ./event-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  booking-service:
    build: ./booking-service
    container_name: booking-service
    restart: unless-stopped
    env_file:
      - ./booking-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
    networks:
      - ticketing_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  chatbot-service:
    build: ./chatbot-service
    container_name: chatbot-service
    restart: unless-stopped
    env_file:
      - ./chatbot-service/.env
    depends_on:
      event-service:
        condition: service_healthy
    networks:
      - ticketing_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: ticketing-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    depends_on:
      identity-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      chatbot-service:
        condition: service_healthy
    networks:
      - ticketing_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: ticketing-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - identity-service
      - event-service
      - booking-service
      - chatbot-service
    networks:
      - ticketing_network

networks:
  ticketing_network:
    driver: bridge

volumes:
  postgres_data:
