apiVersion: v1
kind: Secret
metadata:
  name: ticketing-secrets
  namespace: ticketing
type: Opaque
stringData:
  POSTGRES_PASSWORD: replace-with-secure-postgres-password
  JWT_SECRET: replace-with-at-least-64-random-characters
  ADMIN_EMAIL: admin@example.com
  ADMIN_PASSWORD: replace-with-secure-admin-password
  USER_EMAIL: user@example.com
  USER_PASSWORD: replace-with-secure-user-password
  DB_PASS: replace-with-secure-database-password
